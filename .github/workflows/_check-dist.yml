# In TypeScript actions, `dist/` is a special directory. When you reference
# an action with the `uses:` property, `dist/index.js` is the code that will be
# run. For this project, the `dist/index.js` file is transpiled from other
# source files. This workflow ensures the `dist/` directory contains the
# expected transpiled code.
#
# If this workflow is run from a feature branch, it will act as an additional CI
# check and fail if the checked-in `dist/` directory does not match what is
# expected from the build.
name: Check Transpiled JavaScript

on:
  workflow_call:
    inputs:
      gh_app_release_client_id:
        required: true
        type: string
    secrets:
      GH_APP_RELEASE_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  check-dist:
    name: Check Generated Files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.gh_app_release_client_id }}
          private-key: ${{ secrets.GH_APP_RELEASE_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: get app information
        id: app-info
        run: |
          echo "app-user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "${GITHUB_OUTPUT}"
          echo "APP_SLUG=${APP_SLUG}" >> "${GITHUB_ENV}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}

      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Generate Files
        id: build
        run: npm run all

      - name: Detect File Changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "has_changes=false" >> "${GITHUB_OUTPUT}"

      - name: Commit File Changes
        if: ${{ steps.diff.outputs.has_changes == 'true' && github.event_name == 'pull_request' }}
        env:
          BRANCH: ${{ github.head_ref }}
          GIT_USER_NAME: "${{ env.APP_SLUG }}[bot]"
          GIT_USER_EMAIL: "${{ steps.app-info.outputs.app-user-id }}+${{ env.APP_SLUG }}[bot]@users.noreply.github.com"
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          git commit -m "build(dist): sync generated files"
          git push origin "HEAD:${BRANCH}"

      - name: Retitle Bot PR to build(dist)
        if: ${{ steps.diff.outputs.has_changes == 'true' && github.event_name == 'pull_request' && github.event.pull_request.user.type == 'Bot' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          current_title="$(jq -r '.pull_request.title' "${GITHUB_EVENT_PATH}")"

          if ! printf '%s' "${current_title}" | grep -Eq '^[a-z]+(\([^)]*\))?(!)?:[[:space:]]+'; then
            exit 0
          fi

          new_title="$(printf '%s' "${current_title}" | sed -E 's/^[a-z]+(\([^)]*\))?(!)?:[[:space:]]+/build(dist): /')"

          if [ "${current_title}" = "${new_title}" ]; then
            exit 0
          fi

          gh api \
            --method PATCH \
            "/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
            -f "title=${new_title}"

      # This will fail the workflow if generated files are different than
      # expected.
      - name: Compare Files
        id: verify
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Detected uncommitted changes after build. See status below:"
            git status --short
            git diff --ignore-space-at-eol --text
            exit 1
          fi

      # If `dist/` was different than expected, upload the expected version as a
      # workflow artifact.
      - if: ${{ failure() && steps.verify.outcome == 'failure' }}
        name: Upload Artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

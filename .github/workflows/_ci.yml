on:
  workflow_call:
    inputs:
      gh_app_release_client_id:
        required: true
        type: string
    secrets:
      GH_APP_RELEASE_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  test:
    uses: ./.github/workflows/_test.yml
    permissions:
      contents: read
  lint:
    uses: ./.github/workflows/_linter.yml
    permissions:
      contents: read
      packages: read
      statuses: write
      issues: write
      pull-requests: write
  check-dist:
    uses: ./.github/workflows/_check-dist.yml
    with:
      gh_app_release_client_id: ${{ inputs.gh_app_release_client_id }}
    permissions:
      contents: write
    secrets:
      GH_APP_RELEASE_PRIVATE_KEY: ${{ secrets.GH_APP_RELEASE_PRIVATE_KEY }}
  codeql:
    uses: ./.github/workflows/_codeql-analysis.yml
    permissions:
      actions: read
      checks: write
      contents: read
      security-events: write

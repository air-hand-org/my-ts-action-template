on:
  workflow_call:
    inputs:
      gh_app_release_client_id:
        required: true
        type: string
    secrets:
      GH_APP_RELEASE_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  pr-title:
    if: ${{ github.event_name == 'pull_request' }}
    name: PR Title Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Lint PR Title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test
          requireScope: false

  test:
    uses: ./.github/workflows/_test.yml
    permissions:
      contents: read
  lint:
    uses: ./.github/workflows/_linter.yml
    permissions:
      contents: read
      packages: read
      statuses: write
      issues: write
      pull-requests: write
  check-dist:
    uses: ./.github/workflows/_check-dist.yml
    with:
      gh_app_release_client_id: ${{ inputs.gh_app_release_client_id }}
    permissions:
      contents: write
    secrets:
      GH_APP_RELEASE_PRIVATE_KEY: ${{ secrets.GH_APP_RELEASE_PRIVATE_KEY }}
  codeql:
    uses: ./.github/workflows/_codeql-analysis.yml
    permissions:
      actions: read
      checks: write
      contents: read
      security-events: write

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  ci:
    uses: ./.github/workflows/_ci.yml
    permissions:
      actions: read
      checks: write
      contents: read
      packages: read
      security-events: write
      statuses: write
  
  check-result:
    needs: ci
    runs-on: ubuntu-slim
    timeout-minutes: 5
    if: ${{ always() && needs.ci.result != 'success' }}
    steps:
      - name: exit with failure
        run: exit 1
